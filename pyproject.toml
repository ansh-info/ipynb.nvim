[project]
name = "ipynb"
version = "1.5.1"
description = "Neovim plugin for editing Jupyter notebooks natively with kernel execution and inline output"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = [
  "python-semantic-release>=10.5.3",
]

[tool.semantic_release]
tag_format = "v{version}"
changelog_file = "CHANGELOG.md"
version_toml = ["pyproject.toml:project.version"]
commit_parser = "conventional"
commit_author = "Ansh Kumar <anshkumar.info@gmail.com>"
commit_message = "{version}\n\nAutomatically generated by python-semantic-release\n\nCo-authored-by: Apoorva Gupta <apoorvaagupta.info@gmail.com>"

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
parse_squash_commits = true
ignore_merge_commits = true
